<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            display: flex;
            margin: 0;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
    </style>
    <script>
        function loadNavbar() {
            fetch('menu.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar').innerHTML = data;
                })
                .catch(error => console.error('Error loading navbar:', error));
        }
    </script>
</head>
<body onload="loadNavbar()">
<div id="navbar"></div>
<div class="content">
    <div class="text-center mt-5">
        <h1>Главная</h1>
        <p>Вы находитесь на сайте, предназначенном для продажи товаров.</p>
    </div>
    <div class="row mt-5">
        <div class="col-4">
            <div class="card text-center mb-3 w-75">
                <h5 class="card-header">
                    Товар 1
                </h5>
                <div class="card-body">
                    <h2 class="card-title">$ 100</h2>
                    <p class="card-text">Some content.</p>
                    <button type="button" class="btn btn-outline-primary w-100">Купить</button>
                </div>
            </div>
        </div>

        <div class="col-4">

                <h5 class="card-header">
                    Товар 2
                </h5>
                <div class="card-body">
                    <h2 class="card-title">$ 100</h2>
                    <p class="card-text">Some content.</p>
                    <button type="button" class="btn btn-outline-primary w-100">Купить</button>
                </div>
            </div>
        </div>

        <div class="col-4">
            <div class="card text-center mb-3 w-75">
                <h5 class="card-header">
                    Товар 3
                </h5>
                <div class="card-body">
                    <h2 class="card-title">$ 100</h2>
                    <p class="card-text">Some content.</p>
                    <button type="button" class="btn btn-outline-primary w-100">Купить</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
